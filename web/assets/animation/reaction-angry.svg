<svg viewBox="0 0 84 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Angry reaction animation">
  <style>
    .line { fill: none; stroke: #44514b; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .ink { fill: #44514b; }
    .shell { fill: #b7c7b5; stroke: #44514b; stroke-width: 2.2; }
    .pet { transform-origin: 42px 36px; animation: petShake 320ms steps(2, end) infinite; }
    .steam { animation: steamPulse 700ms ease-out infinite; opacity: 0; }
    .steam.two { animation-delay: 150ms; }
    @keyframes petShake {
      0%, 100% { transform: translateX(-1px); }
      50% { transform: translateX(1px); }
    }
    @keyframes steamPulse {
      0% { opacity: 0; transform: translateY(2px) scale(0.75); }
      30% { opacity: 1; transform: translateY(-2px) scale(1); }
      100% { opacity: 0; transform: translateY(-7px) scale(1.15); }
    }
  </style>
  <rect width="84" height="64" fill="#f4efe6"/>
  <g class="steam" transform="translate(20 16)">
    <path class="line" d="M5 11c-2-2-2-5 0-7 2-2 2-4 0-6"/>
  </g>
  <g class="steam two" transform="translate(58 14)">
    <path class="line" d="M5 11c-2-2-2-5 0-7 2-2 2-4 0-6"/>
  </g>
  <g class="pet">
    <ellipse cx="42" cy="51" rx="18" ry="5" fill="#a8b7a3" opacity="0.45"/>
    <path class="shell" d="M42 17c11 0 21 10 21 22 0 11-9 17-21 17S21 50 21 39c0-12 10-22 21-22Z"/>
    <path class="line" d="M30 32l6-3M48 29l6 3"/>
    <circle class="ink" cx="34" cy="35" r="2.3"/>
    <circle class="ink" cx="50" cy="35" r="2.3"/>
    <path class="line" d="M33 46c3-2 6-3 9-3s6 1 9 3"/>
  </g>
</svg>
